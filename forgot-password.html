<!DOCTYPE html>
<html lang="vi"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Quên mật khẩu - PetShop</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script id="tailwind-config">
    tailwind.config = {
        darkMode: "class",
        theme: {
            extend: {
                "colors": {
                    "surface-container-lowest": "#ffffff",
                    "on-primary-fixed-variant": "#00691a",
                    "outline": "#568061",
                    "surface-dim": "#a0e4b1",
                    "on-surface-variant": "#3b6447",
                    "primary-dim": "#005d16",
                    "on-secondary": "#ccffd6",
                    "surface-container-highest": "#acecbb",
                    "error": "#b02500",
                    "surface-bright": "#ddffe2",
                    "on-primary": "#d1ffc8",
                    "primary-fixed-dim": "#83e881",
                    "surface": "#ffffff",
                    "outline-variant": "#8bb795",
                    "primary": "#006b1b",
                    "surface-tint": "#006b1b",
                    "secondary-container": "#86faac",
                    "on-primary-fixed": "#00480f",
                    "primary-container": "#91f78e",
                    "surface-variant": "#acecbb",
                    "surface-container": "#bef5ca",
                    "on-surface": "#0b361d",
                    "surface-container-high": "#b5f0c2",
                    "background": "#ffffff",
                    "surface-container-low": "#cafdd4",
                    "primary-fixed": "#91f78e",
                    "on-surface-variant": "#3b6447",
                    "inverse-surface": "#001206",
                    "on-background": "#0b361d"
                },
                "borderRadius": {
                    "DEFAULT": "1rem",
                    "lg": "2rem",
                    "xl": "3rem",
                    "full": "9999px"
                },
                "fontFamily": {
                    "headline": ["Plus Jakarta Sans"],
                    "body": ["Plus Jakarta Sans"],
                    "label": ["Plus Jakarta Sans"]
                }
            }
        }
    }
</script>
<style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; }
    .step { display: none; }
    .step.active { display: flex; flex-direction: column; align-items: center; width: 100%; }
    .strength-bar { height: 4px; border-radius: 99px; transition: all 0.3s; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .step.active { animation: fadeIn 0.3s ease; }
    .spinner { display: inline-block; width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.4); border-top-color: white; border-radius: 50%; animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body class="bg-surface-bright min-h-screen flex items-center justify-center p-6 relative overflow-hidden font-body text-on-surface antialiased">

<!-- Background orbs -->
<div class="fixed top-[-10%] left-[-10%] w-[50vw] h-[50vw] bg-surface-container-highest rounded-full mix-blend-multiply blur-[100px] opacity-60 pointer-events-none"></div>
<div class="fixed bottom-[-15%] right-[-10%] w-[60vw] h-[60vw] bg-surface-container rounded-full mix-blend-multiply blur-[120px] opacity-40 pointer-events-none"></div>

<!-- Popup thành công -->
<div id="success-popup" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.4); z-index:9999; align-items:center; justify-content:center;">
    <div style="background:white; border-radius:24px; padding:40px 32px; max-width:360px; width:90%; text-align:center; box-shadow:0 20px 60px rgba(0,0,0,0.15);">
        <div style="font-size:56px; margin-bottom:16px;">🎉</div>
        <h3 style="font-size:20px; font-weight:800; color:#0b361d; margin-bottom:8px;">Đổi mật khẩu thành công!</h3>
        <p style="color:#3b6447; font-size:14px; margin-bottom:20px;">Đang chuyển về trang đăng nhập...</p>
        <div style="font-size:28px; font-weight:800; color:#006b1b;" id="countdown">3</div>
    </div>
</div>

<!-- Main Card -->
<main class="w-full max-w-[440px] bg-surface-container-lowest rounded-xl shadow-[0_24px_60px_rgba(11,54,29,0.06)] p-10 relative z-10 flex flex-col items-center">

    <!-- Logo -->
    <header class="flex items-center justify-center gap-2 text-primary font-bold text-2xl mb-10 font-headline w-full">
        <span class="material-symbols-outlined text-[32px]" style="font-variation-settings: 'FILL' 1;">pets</span>
        PetShop
    </header>

    <!-- Stepper -->
    <nav class="flex items-center justify-center gap-4 mb-10 w-full">
        <div id="dot1" class="w-3 h-3 rounded-full bg-primary shadow-[0_0_12px_rgba(0,107,27,0.4)] transition-all"></div>
        <div id="line1" class="w-16 h-[2px] bg-surface-container-highest rounded-full transition-all"></div>
        <div id="dot2" class="w-3 h-3 rounded-full bg-surface-container-highest transition-all"></div>
    </nav>

    <!-- BƯỚC 1: NHẬP EMAIL -->
    <div class="step active" id="step1">
        <div class="w-20 h-20 bg-surface-container-low rounded-xl -rotate-6 flex items-center justify-center mb-8 shadow-[0_12px_40px_rgba(11,54,29,0.08)] hover:-rotate-12 transition-transform duration-500">
            <span class="material-symbols-outlined text-[40px] text-primary rotate-6" style="font-variation-settings: 'FILL' 1;">mail</span>
        </div>
        <h1 class="text-[2.2rem] font-bold font-headline text-on-surface tracking-[-0.02em] leading-tight mb-3 text-center">Quên mật khẩu?</h1>
        <p class="text-on-surface-variant text-base text-center mb-8 px-4 leading-relaxed">Nhập email đã đăng ký để đặt lại mật khẩu mới.</p>

        <div class="w-full flex flex-col gap-6">
            <div class="flex flex-col gap-3">
                <label class="text-sm font-semibold text-on-surface-variant px-5 tracking-wide" for="email">Email của bạn</label>
                <input class="w-full bg-surface-container-low rounded-full px-6 py-4 outline-none text-on-surface focus:bg-surface-container-highest transition-all duration-300 placeholder:text-outline-variant border-none" id="email" placeholder="Nhập email của bạn" type="email"/>
                <div id="email-error" style="display:none;" class="text-red-600 text-sm px-5">❌ <span></span></div>
            </div>

            <button id="btn-step1" onclick="handleStep1()" class="w-full bg-gradient-to-r from-primary to-primary-dim text-on-primary font-bold text-lg rounded-full py-4 mt-2 shadow-[0_8px_24px_rgba(0,107,27,0.2)] hover:scale-[1.02] active:scale-95 transition-all duration-300 flex items-center justify-center gap-2">
                Tiếp tục
                <span class="material-symbols-outlined text-[20px]">arrow_forward</span>
            </button>
        </div>

        <div class="mt-8 text-center w-full">
            <a href="login.html" class="inline-flex items-center justify-center gap-2 text-primary font-semibold hover:text-primary-dim transition-colors group py-2 px-4 rounded-full hover:bg-surface-container-low">
                <span class="material-symbols-outlined group-hover:-translate-x-1 transition-transform duration-300">arrow_back</span>
                Quay lại đăng nhập
            </a>
        </div>
    </div>

    <!-- BƯỚC 2: ĐẶT MẬT KHẨU MỚI -->
    <div class="step" id="step2">
        <div class="w-20 h-20 bg-surface-container-low rounded-xl rotate-6 flex items-center justify-center mb-8 shadow-[0_12px_40px_rgba(11,54,29,0.08)] hover:rotate-12 transition-transform duration-500">
            <span class="material-symbols-outlined text-[40px] text-primary -rotate-6" style="font-variation-settings: 'FILL' 1;">key</span>
        </div>
        <h1 class="text-[2.2rem] font-bold font-headline text-on-surface tracking-[-0.02em] leading-tight mb-3 text-center">Mật khẩu mới</h1>
        <p id="step2-desc" class="text-on-surface-variant text-sm text-center mb-8 px-4 leading-relaxed">Tạo mật khẩu mới cho tài khoản của bạn.</p>

        <div class="w-full flex flex-col gap-5">
            <!-- Mật khẩu mới -->
            <div class="flex flex-col gap-3">
                <label class="text-sm font-semibold text-on-surface-variant px-5 tracking-wide">Mật khẩu mới</label>
                <div class="relative">
                    <input class="w-full bg-surface-container-low rounded-full px-6 py-4 pr-14 outline-none text-on-surface focus:bg-surface-container-highest transition-all duration-300 placeholder:text-outline-variant border-none" id="new-password" placeholder="Tối thiểu 6 ký tự" type="password" oninput="checkStrength()"/>
                    <button type="button" onclick="togglePass('new-password', this)" class="absolute right-5 top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-primary transition-colors">
                        <span class="material-symbols-outlined text-[20px]">visibility</span>
                    </button>
                </div>
                <!-- Thanh độ mạnh -->
                <div class="px-2">
                    <div class="flex gap-1 mb-1">
                        <div class="strength-bar flex-1 bg-surface-container-highest" id="bar1"></div>
                        <div class="strength-bar flex-1 bg-surface-container-highest" id="bar2"></div>
                        <div class="strength-bar flex-1 bg-surface-container-highest" id="bar3"></div>
                    </div>
                    <p id="strength-text" class="text-xs text-on-surface-variant px-1"></p>
                </div>
            </div>

            <!-- Xác nhận mật khẩu -->
            <div class="flex flex-col gap-3">
                <label class="text-sm font-semibold text-on-surface-variant px-5 tracking-wide">Xác nhận mật khẩu</label>
                <div class="relative">
                    <input class="w-full bg-surface-container-low rounded-full px-6 py-4 pr-14 outline-none text-on-surface focus:bg-surface-container-highest transition-all duration-300 placeholder:text-outline-variant border-none" id="confirm-password" placeholder="Nhập lại mật khẩu" type="password"/>
                    <button type="button" onclick="togglePass('confirm-password', this)" class="absolute right-5 top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-primary transition-colors">
                        <span class="material-symbols-outlined text-[20px]">visibility</span>
                    </button>
                </div>
            </div>

            <div id="step2-error" style="display:none;" class="text-red-600 text-sm px-2">❌ <span></span></div>

            <button id="btn-step2" onclick="handleStep2()" class="w-full bg-gradient-to-r from-primary to-primary-dim text-on-primary font-bold text-lg rounded-full py-4 mt-2 shadow-[0_8px_24px_rgba(0,107,27,0.2)] hover:scale-[1.02] active:scale-95 transition-all duration-300 flex items-center justify-center gap-2">
                Cập nhật mật khẩu
                <span class="material-symbols-outlined text-[20px]">check_circle</span>
            </button>
        </div>

        <div class="mt-8 text-center w-full">
            <button onclick="goStep(1)" class="inline-flex items-center justify-center gap-2 text-primary font-semibold hover:text-primary-dim transition-colors group py-2 px-4 rounded-full hover:bg-surface-container-low">
                <span class="material-symbols-outlined group-hover:-translate-x-1 transition-transform duration-300">arrow_back</span>
                Quay lại
            </button>
        </div>
    </div>

</main>

<script>
const API = 'http://localhost:8080';
let savedEmail = '';

// ── STEPPER ──
function goStep(n) {
    document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
    document.getElementById('step' + n).classList.add('active');

    // Cập nhật stepper dots
    if (n === 1) {
        document.getElementById('dot1').className = 'w-3 h-3 rounded-full bg-primary shadow-[0_0_12px_rgba(0,107,27,0.4)] transition-all';
        document.getElementById('dot2').className = 'w-3 h-3 rounded-full bg-surface-container-highest transition-all';
        document.getElementById('line1').className = 'w-16 h-[2px] bg-surface-container-highest rounded-full transition-all';
    } else {
        document.getElementById('dot1').className = 'w-3 h-3 rounded-full bg-primary transition-all';
        document.getElementById('dot2').className = 'w-3 h-3 rounded-full bg-primary shadow-[0_0_12px_rgba(0,107,27,0.4)] transition-all';
        document.getElementById('line1').className = 'w-16 h-[2px] bg-primary rounded-full transition-all';
    }
}

// ── BƯỚC 1: KIỂM TRA EMAIL ──
async function handleStep1() {
    const email = document.getElementById('email').value.trim();
    const btn = document.getElementById('btn-step1');
    const errEl = document.getElementById('email-error');

    // Validate email
    if (!email) { showErr('email-error', 'Vui lòng nhập email!'); return; }
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { showErr('email-error', 'Email không đúng định dạng!'); return; }

    // Loading
    btn.disabled = true;
    btn.innerHTML = '<div class="spinner"></div> Đang kiểm tra...';

    try {
        const res = await fetch(`${API}/api/auth/forgot-password`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email })
        });
        const json = await res.json();

        if (json.success) {
            savedEmail = email;
            document.getElementById('step2-desc').textContent = `Tạo mật khẩu mới cho tài khoản: ${email}`;
            btn.innerHTML = '✅ Email hợp lệ!';
            setTimeout(() => {
                goStep(2);
                btn.disabled = false;
                btn.innerHTML = 'Tiếp tục <span class="material-symbols-outlined text-[20px]">arrow_forward</span>';
            }, 1000);
        } else {
            showErr('email-error', json.message || 'Email không tồn tại trong hệ thống!');
            btn.disabled = false;
            btn.innerHTML = 'Tiếp tục <span class="material-symbols-outlined text-[20px]">arrow_forward</span>';
        }
    } catch (e) {
        showErr('email-error', 'Không kết nối được server! Kiểm tra backend đang chạy chưa.');
        btn.disabled = false;
        btn.innerHTML = 'Tiếp tục <span class="material-symbols-outlined text-[20px]">arrow_forward</span>';
    }
}

// ── BƯỚC 2: ĐẶT MẬT KHẨU MỚI ──
async function handleStep2() {
    const newPass = document.getElementById('new-password').value.trim();
    const confirmPass = document.getElementById('confirm-password').value.trim();
    const btn = document.getElementById('btn-step2');

    // Validate
    if (!newPass || newPass.length < 6) { showErr('step2-error', 'Mật khẩu phải có ít nhất 6 ký tự!'); return; }
    if (newPass !== confirmPass) { showErr('step2-error', 'Mật khẩu nhập lại không khớp!'); return; }

    // Loading
    btn.disabled = true;
    btn.innerHTML = '<div class="spinner"></div> Đang cập nhật...';

    try {
        const res = await fetch(`${API}/api/auth/reset-password`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email: savedEmail, newPassword: newPass })
        });
        const json = await res.json();

        if (json.success) {
            // Hiện popup đếm ngược
            const popup = document.getElementById('success-popup');
            popup.style.display = 'flex';
            let count = 3;
            const timer = setInterval(() => {
                count--;
                document.getElementById('countdown').textContent = count;
                if (count <= 0) {
                    clearInterval(timer);
                    window.location.href = 'login.html';
                }
            }, 1000);
        } else {
            showErr('step2-error', json.message || 'Cập nhật thất bại, vui lòng thử lại!');
            btn.disabled = false;
            btn.innerHTML = 'Cập nhật mật khẩu <span class="material-symbols-outlined text-[20px]">check_circle</span>';
        }
    } catch (e) {
        showErr('step2-error', 'Không kết nối được server! Kiểm tra backend đang chạy chưa.');
        btn.disabled = false;
        btn.innerHTML = 'Cập nhật mật khẩu <span class="material-symbols-outlined text-[20px]">check_circle</span>';
    }
}

// ── HELPER: Hiện lỗi ──
function showErr(id, msg) {
    const el = document.getElementById(id);
    el.querySelector('span').textContent = msg;
    el.style.display = 'block';
}

// ── HELPER: Toggle password ──
function togglePass(inputId, btn) {
    const input = document.getElementById(inputId);
    const icon = btn.querySelector('span');
    if (input.type === 'password') {
        input.type = 'text';
        icon.textContent = 'visibility_off';
    } else {
        input.type = 'password';
        icon.textContent = 'visibility';
    }
}

// ── HELPER: Độ mạnh mật khẩu ──
function checkStrength() {
    const val = document.getElementById('new-password').value;
    const bars = [document.getElementById('bar1'), document.getElementById('bar2'), document.getElementById('bar3')];
    const text = document.getElementById('strength-text');
    bars.forEach(b => b.style.background = '#acecbb');

    if (val.length === 0) { text.textContent = ''; return; }
    if (val.length < 6) {
        bars[0].style.background = '#ef4444';
        text.textContent = '🔴 Yếu';
        text.style.color = '#ef4444';
    } else if (val.length < 10) {
        bars[0].style.background = '#f97316';
        bars[1].style.background = '#f97316';
        text.textContent = '🟠 Trung bình';
        text.style.color = '#f97316';
    } else {
        bars.forEach(b => b.style.background = '#16a34a');
        text.textContent = '🟢 Mạnh';
        text.style.color = '#16a34a';
    }
}

// Ẩn lỗi khi nhập lại
document.getElementById('email').addEventListener('input', () => {
    document.getElementById('email-error').style.display = 'none';
});
document.getElementById('new-password').addEventListener('input', () => {
    document.getElementById('step2-error').style.display = 'none';
});
document.getElementById('confirm-password').addEventListener('input', () => {
    document.getElementById('step2-error').style.display = 'none';
});

// Enter để submit
document.getElementById('email').addEventListener('keydown', e => {
    if (e.key === 'Enter') handleStep1();
});
document.getElementById('confirm-password').addEventListener('keydown', e => {
    if (e.key === 'Enter') handleStep2();
});
</script>
</body></html>
