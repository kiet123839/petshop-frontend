</div>

<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant group-focus-within:text-primary transition-colors">lock</span>

                        <a class="text-primary font-bold hover:text-primary-dim transition-colors relative after:content-[''] after:absolute after:-bottom-1 after:left-0 after:w-full after:h-0.5 after:bg-primary/30 after:rounded-full hover:after:bg-primary transition-all" href="register.html">Đăng ký ngay</a>
</p>

<span class="material-symbols-outlined text-outline" style="font-variation-settings: 'FILL' 1;">eco</span>
<div class="w-12 h-px bg-outline-variant/30"></div>
<span class="material-symbols-outlined text-outline">favorite</span>
<div class="w-12 h-px bg-outline-variant/30"></div>
<span class="material-symbols-outlined text-outline" style="font-variation-settings: 'FILL' 1;">spa</span>
</div>

</main>
<script>
const API = 'http://localhost:8080';

if (localStorage.getItem('token')) {
  window.location.href = 'dashboard.html';
}

// Nút đăng nhập - lấy đúng bằng text content
const allButtons = document.querySelectorAll('button');
let loginBtn = null;
let toggleBtn = null;

allButtons.forEach(btn => {
  if (btn.getAttribute('aria-label') === 'Toggle password visibility') {
    toggleBtn = btn;
  } else if (btn.textContent.includes('Đăng nhập')) {
    loginBtn = btn;
  }
});



// Xử lý đăng nhập
if (loginBtn) {
  loginBtn.addEventListener('click', async () => {
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value.trim();

    if (!username || !password) {
      showError('Vui lòng nhập đầy đủ thông tin!');
      return;
    }

    loginBtn.disabled = true;
    loginBtn.innerHTML = 'Đang đăng nhập...';

    try {
      const res = await fetch(`${API}/api/auth/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });

      const json = await res.json();

     if (json.success) {
    localStorage.setItem('token', json.data.token);
    localStorage.setItem('user', JSON.stringify(json.data));

    const role = json.data.role;
    if (role === 'Admin' || role === 'Manager' || role === 'Employee') {
        // Vào index.html nhưng mở sẵn trạng thái quản lý cửa hàng
        localStorage.setItem('open_dashboard', 'true');
        window.location.href = 'index.html';
    } else {
        // Customer → vào index bình thường
        window.location.href = 'index.html';
    }
      
      } else {
        showError(json.message || 'Sai tên đăng nhập hoặc mật khẩu!');
        loginBtn.disabled = false;
        loginBtn.innerHTML = 'Đăng nhập';
      }
    } catch (e) {
      showError('Không kết nối được server!');
      loginBtn.disabled = false;
      loginBtn.innerHTML = 'Đăng nhập';
    }
  });
}

// Toggle show/hide password - tách riêng hoàn toàn
if (toggleBtn) {
  toggleBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    const input = document.getElementById('password');
    const icon = toggleBtn.querySelector('span');
    if (input.type === 'password') {
      input.type = 'text';
      icon.textContent = 'visibility_off';
    } else {
      input.type = 'password';
      icon.textContent = 'visibility';
    }
  });
}

// Enter để đăng nhập
document.getElementById('password').addEventListener('keydown', e => {
  if (e.key === 'Enter') loginBtn && loginBtn.click();
});
document.getElementById('username').addEventListener('keydown', e => {
  if (e.key === 'Enter') loginBtn && loginBtn.click();
});

// Ẩn lỗi khi nhập lại
document.getElementById('username').addEventListener('input', () => {
  const box = document.getElementById('err-box');
  if (box) box.style.display = 'none';
});
document.getElementById('password').addEventListener('input', () => {
  const box = document.getElementById('err-box');
  if (box) box.style.display = 'none';
});

function showError(msg) {
  let box = document.getElementById('err-box');
  if (!box) {
    box = document.createElement('div');
    box.id = 'err-box';
    box.style.cssText = 'background:#fee2e2;color:#b91c1c;padding:12px 16px;border-radius:12px;font-size:14px;margin-top:8px;';
    document.querySelector('form').appendChild(box);
  }
  box.textContent = '❌ ' + msg;
  box.style.display = 'block';
}
</script>
